<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GMEG CRM MVP</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  />

  <link rel="stylesheet" href="style.css" />

  <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="layout">
    <aside class="sidebar">
      <div class="sidebar-logo">
        <div class="logo-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 3v18h18"></path>
            <path d="M7 14l4-4 4 4 5-5"></path>
          </svg>
        </div>
        <div>
          <div class="logo-text-org">GMEG</div>
          <div class="logo-text-app">CRM MVP</div>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-section">메인</div>
        <button class="nav-item active" data-page="dashboard">
          <span class="nav-icon">▦</span>
          대시보드
        </button>

        <button class="nav-item" data-page="companies">
          <span class="nav-icon">🏢</span>
          기업 DB
          <span class="nav-badge" id="riskBadge" style="display:none"></span>
        </button>

        <div class="nav-section">운영</div>
        <button class="nav-item" data-page="calendar">
          <span class="nav-icon">📅</span>
          전시 캘린더
        </button>

        <button class="nav-item" data-page="uploads">
          <span class="nav-icon">⬆</span>
          파일 업로드
        </button>

        <div class="nav-section">설정</div>
        <button class="nav-item" data-page="settings">
          <span class="nav-icon">⚙</span>
          설정
        </button>
      </nav>

      <div class="sidebar-footer">
        <div class="user-card">
          <div class="user-avatar">이</div>
          <div>
            <div class="user-name">이하정</div>
            <div class="user-role">CRM 파트 / 관리자</div>
          </div>
        </div>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h1 class="page-title" id="pageTitle">대시보드</h1>
          <p class="page-sub" id="pageSubtitle">오늘 확인해야 할 CRM 현황과 우선 업무</p>
        </div>

        <div class="topbar-actions" id="topbarActions"></div>
      </header>

      <section class="content" id="content"></section>
    </main>
  </div>

  <!-- 기업 상세 모달 -->
  <div class="modal-overlay" id="companyModal">
    <div class="modal modal-lg">
      <div class="modal-header" id="companyModalHeader"></div>
      <div class="modal-tabs" id="companyModalTabs"></div>
      <div class="modal-body" id="companyModalBody"></div>
      <div class="modal-footer">
        <button class="btn btn-ghost btn-sm" id="closeCompanyModalBtn">닫기</button>
      </div>
    </div>
  </div>

  <!-- 기업 등록 모달 -->
  <div class="modal-overlay" id="addModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title-row">
          <div class="modal-icon-large gradient-purple">+</div>
          <div>
            <div class="modal-main-title">새 기업 등록</div>
            <div class="modal-sub-title">통합 DB에 기업 정보를 추가합니다.</div>
          </div>
        </div>
        <button class="modal-close" id="closeAddModalBtn">✕</button>
      </div>

      <div class="modal-body">
        <div class="form-grid">
          <div class="form-group">
            <label class="form-label" for="addName">기업명</label>
            <input class="form-input" id="addName" type="text" />
          </div>
          <div class="form-group">
            <label class="form-label" for="addCountry">국가</label>
            <input class="form-input" id="addCountry" type="text" />
          </div>
          <div class="form-group">
            <label class="form-label" for="addIndustry">산업군</label>
            <input class="form-input" id="addIndustry" type="text" />
          </div>
          <div class="form-group">
            <label class="form-label" for="addType">유형</label>
            <select class="form-select" id="addType">
              <option value="바이어">바이어</option>
              <option value="참가업체">참가업체</option>
              <option value="고객">고객</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="addManager">담당자명</label>
            <input class="form-input" id="addManager" type="text" />
          </div>
          <div class="form-group">
            <label class="form-label" for="addAssignee">내부 담당</label>
            <input class="form-input" id="addAssignee" type="text" value="이하정" />
          </div>
          <div class="form-group">
            <label class="form-label" for="addEmail">이메일</label>
            <input class="form-input" id="addEmail" type="email" />
          </div>
          <div class="form-group">
            <label class="form-label" for="addPhone">전화번호</label>
            <input class="form-input" id="addPhone" type="text" />
          </div>
          <div class="form-group full">
            <label class="form-label" for="addMemo">메모</label>
            <textarea class="form-textarea" id="addMemo"></textarea>
          </div>
        </div>
      </div>

      <div class="modal-footer">
        <button class="btn btn-ghost btn-sm" id="cancelAddBtn">취소</button>
        <button class="btn btn-primary btn-sm" id="saveAddBtn">등록하기</button>
      </div>
    </div>
  </div>

  <!-- 위젯 추가 모달 -->
  <div class="modal-overlay" id="widgetModal">
    <div class="modal">
      <div class="modal-header">
        <div class="modal-title-row">
          <div class="modal-icon-large gradient-purple">▦</div>
          <div>
            <div class="modal-main-title">위젯 추가</div>
            <div class="modal-sub-title">숨긴 위젯을 다시 추가할 수 있습니다.</div>
          </div>
        </div>
        <button class="modal-close" id="closeWidgetModalBtn">✕</button>
      </div>

      <div class="modal-body" id="widgetModalBody"></div>

      <div class="modal-footer">
        <button class="btn btn-ghost btn-sm" id="closeWidgetFooterBtn">닫기</button>
      </div>
    </div>
  </div>

  <!-- 업로드 매핑 모달 -->
  <div class="modal-overlay" id="mappingModal">
    <div class="modal modal-lg">
      <div class="modal-header">
        <div class="modal-title-row">
          <div class="modal-icon-large gradient-purple">⇅</div>
          <div>
            <div class="modal-main-title">업로드 컬럼 매핑</div>
            <div class="modal-sub-title">파일의 열을 CRM 필드와 연결합니다.</div>
          </div>
        </div>
        <button class="modal-close" id="closeMappingModalBtn">✕</button>
      </div>

      <div class="modal-body" id="mappingModalBody"></div>

      <div class="modal-footer">
        <button class="btn btn-ghost btn-sm" id="cancelMappingBtn">취소</button>
        <button class="btn btn-primary btn-sm" id="applyMappingBtn">매핑 적용</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="script.js"></script>
</body>
</html>
